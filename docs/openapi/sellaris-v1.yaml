openapi: 3.0.3
info:
  title: Sellaris API
  version: 1.0.0
  description: |
    OpenAPI specification for the current Sellaris backend implementation.

    This spec is optimized for frontend developers and AI agents generating UI or typed clients.

    Integration notes:

    - Authentication is Django session based, not bearer-token based.
    - The API is available under both `/api/v1` and `/v1`.
    - Some grouped routes intentionally repeat a resource segment, for example `/products/products` and `/carts/cart-items`.
    - Guest carts, wishlists, orders, and payment records are scoped by the active Django session.
    - Unsafe browser requests that send cookies should also send `X-CSRFToken`.
servers:
  - url: /api/v1
    description: Preferred versioned API prefix
  - url: /v1
    description: Alternate versioned API prefix
tags:
  - name: Auth
    description: Registration, login, verification, account management, and OAuth entrypoints
  - name: Catalog
    description: Categories, products, variants, specifications, and product images
  - name: Cart
    description: Session-aware carts and cart items
  - name: Wishlist
    description: Private and public wishlists with guest session ownership support
  - name: Orders
    description: Checkout order creation and owned order retrieval
  - name: Payments
    description: Payment initialization and owned payment history
  - name: Inventory
    description: Staff inventory management and staff audit routes
paths:
  /users/register:
    post:
      tags: [Auth]
      operationId: registerUser
      summary: Register a new shopper account
      description: |
        Creates a new user, queues the verification email task, and transfers any guest-owned cart,
        wishlist, and pending orders to the new account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              email: shopper@example.com
              password: StrongPass123
              first_name: Ada
              last_name: Lovelace
      responses:
        '201':
          description: User created and verification email queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: User created. Check your email to verify.
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          description: Rate limit exceeded
  /users/login:
    post:
      tags: [Auth]
      operationId: loginUser
      summary: Log in with email and password
      description: |
        Authenticates the user and creates a Django session cookie.

        Important frontend note:

        - the response body is only a success message
        - the authenticated state is established by the session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: shopper@example.com
              password: StrongPass123
      responses:
        '200':
          description: Login successful. Session cookie is set by Django.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Login successful
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              example:
                detail: Invalid credentials
        '403':
          description: Email exists but is not verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              example:
                detail: "Email not verified, use: <frontend verify route>"
        '429':
          description: Rate limit exceeded
  /users/verify-email:
    get:
      tags: [Auth]
      operationId: verifyEmail
      summary: Verify an email address
      description: |
        Confirms the verification token. Tokens are based on Django's password reset token generator
        and should be treated as expiring after 24 hours.
      parameters:
        - in: query
          name: uid
          required: true
          schema:
            type: string
          description: URL-safe base64 encoded user identifier
        - in: query
          name: token
          required: true
          schema:
            type: string
          description: Email verification token
      responses:
        '200':
          description: Email verified.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Email verified
        '400':
          description: Invalid link or token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                invalidLink:
                  value:
                    detail: Invalid link
                invalidToken:
                  value:
                    detail: Invalid or expired token
        '429':
          description: Rate limit exceeded
  /users/resend-email-verify:
    post:
      tags: [Auth]
      operationId: resendVerificationEmail
      summary: Resend verification email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
            example:
              email: shopper@example.com
      responses:
        '200':
          description: Safe generic success response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: If account exists, email sent
        '429':
          description: Rate limit exceeded
  /users/account-info:
    get:
      tags: [Auth]
      operationId: getAccountInfo
      summary: Get the current authenticated account
      security:
        - SessionCookie: []
      responses:
        '200':
          description: Current user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountInfo'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /users/manage-account:
    patch:
      tags: [Auth]
      operationId: updateAccount
      summary: Update the current authenticated account
      security:
        - SessionCookie: []
      description: |
        Session-authenticated endpoint.

        Browser clients should send `X-CSRFToken` when cookies are included.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccountUpdateRequest'
            example:
              first_name: Ada
              last_name: Lovelace
              username: ada-l
      responses:
        '200':
          description: Account updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              example:
                detail: Account updated successfully
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /users/delete:
    post:
      tags: [Auth]
      operationId: deleteAccount
      summary: Soft-delete the current account
      security:
        - SessionCookie: []
      description: |
        Marks the account inactive, logs the user out, and schedules permanent deletion 30 days later.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
            example:
              password: StrongPass123
      responses:
        '202':
          description: Deletion scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              example:
                detail: Account deactivated. It will be permanently deleted in 30 days.
        '400':
          description: Invalid password or deletion already scheduled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                invalidPassword:
                  value:
                    detail: Invalid password
                alreadyScheduled:
                  value:
                    detail: Deletion already scheduled
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
  /users/google:
    post:
      tags: [Auth]
      operationId: loginWithGoogle
      summary: Log in with a Google token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
            example:
              token: google-id-token
      responses:
        '200':
          description: OAuth login successful. Session cookie is set by Django.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Login successful
        '400':
          description: Missing or invalid token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                missingToken:
                  value:
                    detail: Token required
                invalidToken:
                  value:
                    detail: Invalid token
        '429':
          description: Rate limit exceeded
  /users/facebook:
    post:
      tags: [Auth]
      operationId: loginWithFacebook
      summary: Log in with a Facebook token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
            example:
              token: facebook-access-token
      responses:
        '200':
          description: OAuth login successful. Session cookie is set by Django.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Login successful
        '400':
          description: Missing token, invalid token, or email permission missing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                missingToken:
                  value:
                    detail: Token required
                invalidToken:
                  value:
                    detail: Invalid token
                missingEmail:
                  value:
                    detail: Email permission required
        '429':
          description: Rate limit exceeded
  /users/apple:
    post:
      tags: [Auth]
      operationId: loginWithApple
      summary: Log in with an Apple identity token
      description: |
        Apple may omit email on later logins. In that case the backend falls back to an existing provider link.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OAuthTokenRequest'
            example:
              token: apple-identity-token
      responses:
        '200':
          description: OAuth login successful. Session cookie is set by Django.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
              example:
                message: Login successful
        '400':
          description: Missing token, invalid token, or provider mapping not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DetailResponse'
              examples:
                missingToken:
                  value:
                    detail: Token required
                invalidToken:
                  value:
                    detail: Invalid token
                missingEmail:
                  value:
                    detail: Email not provided by Apple
        '429':
          description: Rate limit exceeded
  /products/categories:
    get:
      tags: [Catalog]
      operationId: listCategories
      summary: List categories
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
      responses:
        '200':
          description: Paginated category list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoryList'
    post:
      tags: [Catalog]
      operationId: createCategory
      summary: Create a category
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWrite'
            example:
              name: Laptops
      responses:
        '201':
          description: Category created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /products/categories/{categoryId}:
    parameters:
      - $ref: '#/components/parameters/CategoryId'
    get:
      tags: [Catalog]
      operationId: getCategory
      summary: Retrieve a category
      responses:
        '200':
          description: Category details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryRead'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Catalog]
      operationId: updateCategory
      summary: Replace a category
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryWrite'
      responses:
        '200':
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    patch:
      tags: [Catalog]
      operationId: patchCategory
      summary: Partially update a category
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryPatch'
      responses:
        '200':
          description: Category updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Catalog]
      operationId: deleteCategory
      summary: Delete a category
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      responses:
        '204':
          description: Category deleted.
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /products/products:
    get:
      tags: [Catalog]
      operationId: listProducts
      summary: List products
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Ordering'
        - in: query
          name: category
          schema:
            type: string
            format: uuid
        - in: query
          name: brand
          schema:
            type: string
        - in: query
          name: currency
          schema:
            $ref: '#/components/schemas/Currency'
      responses:
        '200':
          description: Paginated product list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductList'
    post:
      tags: [Catalog]
      operationId: createProduct
      summary: Create a product
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
            example:
              name: MacBook Pro
              brand: Apple
              description: 14-inch laptop
              category: 8d8c9f0a-02ab-40c0-a91b-d0a63c12b001
              base_price: '1499.99'
              currency: USD
              slug: macbook-pro
      responses:
        '201':
          description: Product created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /products/products/{productId}:
    parameters:
      - $ref: '#/components/parameters/ProductId'
    get:
      tags: [Catalog]
      operationId: getProduct
      summary: Retrieve a product
      responses:
        '200':
          description: Product details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductRead'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Catalog]
      operationId: updateProduct
      summary: Replace a product
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductWrite'
      responses:
        '200':
          description: Product updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    patch:
      tags: [Catalog]
      operationId: patchProduct
      summary: Partially update a product
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductPatch'
      responses:
        '200':
          description: Product updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Catalog]
      operationId: deleteProduct
      summary: Delete a product
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      responses:
        '204':
          description: Product deleted.
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /products/product-variants:
    get:
      tags: [Catalog]
      operationId: listProductVariants
      summary: List product variants
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - $ref: '#/components/parameters/Ordering'
        - in: query
          name: product
          schema:
            type: string
            format: uuid
        - in: query
          name: color
          schema:
            type: string
        - in: query
          name: storage_size
          schema:
            type: string
        - in: query
          name: currency
          schema:
            $ref: '#/components/schemas/Currency'
      responses:
        '200':
          description: Paginated product variant list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductVariantList'
    post:
      tags: [Catalog]
      operationId: createProductVariant
      summary: Create a product variant
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductVariantWrite'
            example:
              product: 1f61af46-d25d-4a1a-b604-4c6c0d1f1001
              color: Space Gray
              storage_size: 512GB
              price: '1699.99'
              currency: USD
              stock_quantity: 20
              reserved_stock: 0
      responses:
        '201':
          description: Product variant created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariantWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /products/product-variants/{variantId}:
    parameters:
      - $ref: '#/components/parameters/VariantId'
    get:
      tags: [Catalog]
      operationId: getProductVariant
      summary: Retrieve a product variant
      responses:
        '200':
          description: Product variant details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariantRead'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Catalog]
      operationId: updateProductVariant
      summary: Replace a product variant
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductVariantWrite'
      responses:
        '200':
          description: Product variant updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariantWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    patch:
      tags: [Catalog]
      operationId: patchProductVariant
      summary: Partially update a product variant
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductVariantPatch'
      responses:
        '200':
          description: Product variant updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductVariantWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    delete:
      tags: [Catalog]
      operationId: deleteProductVariant
      summary: Delete a product variant
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      responses:
        '204':
          description: Product variant deleted.
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
  /products/specifications:
    get:
      tags: [Catalog]
      operationId: listSpecifications
      summary: List specifications
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - $ref: '#/components/parameters/Search'
        - in: query
          name: product_variant
          schema:
            type: string
            format: uuid
        - in: query
          name: name
          schema:
            type: string
      responses:
        '200':
          description: Paginated specification list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedSpecificationList'
    post:
      tags: [Catalog]
      operationId: createSpecification
      summary: Create a specification
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecificationWrite'
            example:
              product_variant: 6c6d7030-fd91-4d30-8a74-457b5f670001
              name: processor
              value: M3 Pro
      responses:
        '201':
          description: Specification created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecificationWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
  /products/specifications/{specificationId}:
    parameters:
      - $ref: '#/components/parameters/SpecificationId'
    get:
      tags: [Catalog]
      operationId: getSpecification
      summary: Retrieve a specification
      responses:
        '200':
          description: Specification details.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecificationRead'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    put:
      tags: [Catalog]
      operationId: updateSpecification
      summary: Replace a specification
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecificationWrite'
      responses:
        '200':
          description: Specification updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecificationWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
        '404':
          $ref: '#/components/responses/NotFoundResponse'
    patch:
      tags: [Catalog]
      operationId: patchSpecification
      summary: Partially update a specification
      security:
        - SessionCookie: []
      description: Staff-only write endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SpecificationPatch'
      responses:
        '200':
          description: Specification updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpecificationWrite'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
