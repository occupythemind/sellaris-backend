          name: performed_by
          schema:
            type: string
            format: uuid
        - in: query
          name: created_at__gte
          schema:
            type: string
            format: date-time
        - in: query
          name: created_at__lte
          schema:
            type: string
            format: date-time
      responses:
        '200':
