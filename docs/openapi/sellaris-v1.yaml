          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedInventoryLogList'
        '401':
          $ref: '#/components/responses/UnauthorizedResponse'
        '403':
          $ref: '#/components/responses/ForbiddenResponse'
components:
  securitySchemes:
    SessionCookie:
      type: apiKey
      in: cookie
      name: sessionid
      description: |
        Django session cookie established after login or OAuth.

        Browser clients that send this cookie on unsafe requests should also send `X-CSRFToken`.
  parameters:
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
      description: Pagination page number
    PageSize:
      in: query
      name: page_size
      schema:
        type: integer
        minimum: 1
        maximum: 200
      description: Requested page size. Most endpoints cap at 50. Inventory logs cap at 200.
    Search:
      in: query
      name: search
      schema:
        type: string
      description: Search term for endpoints that support DRF search
    Ordering:
      in: query
      name: ordering
      schema:
        type: string
      description: DRF ordering parameter, for example `name` or `-created_at`
    CategoryId:
      in: path
      name: categoryId
      required: true
      schema:
        type: string
        format: uuid
    ProductId:
      in: path
      name: productId
      required: true
      schema:
        type: string
        format: uuid
    VariantId:
      in: path
      name: variantId
      required: true
      schema:
        type: string
        format: uuid
    SpecificationId:
      in: path
      name: specificationId
      required: true
      schema:
        type: string
        format: uuid
    ImageId:
      in: path
      name: imageId
      required: true
      schema:
        type: string
        format: uuid
    CartId:
      in: path
      name: cartId
      required: true
      schema:
        type: string
        format: uuid
    CartItemId:
      in: path
      name: cartItemId
      required: true
      schema:
        type: integer
    WishlistId:
      in: path
      name: wishlistId
      required: true
      schema:
        type: string
        format: uuid
    WishlistItemId:
      in: path
      name: wishlistItemId
      required: true
      schema:
        type: integer
    OrderId:
      in: path
      name: orderId
      required: true
