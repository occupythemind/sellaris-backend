services:
  web:
    image: sellaris:latest
    volumes:
      - media-data:/app/media
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file:
      - .env                # Changed from ../.env to .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    
  redis:
    image: redis:7
    command:
      - redis-server
      - "--requirepass"
      - "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network         # Added to ensure connectivity

  celery_default:
    image: sellaris:latest
    command: celery -A config worker -Q default -l info
    volumes:
      - media-data:/app/media
    env_file:
      - .env                # Changed from ../.env to .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - app-network

  celery_emails:
    image: sellaris:latest
    command: celery -A config worker -Q emails -l info
    volumes:
      - media-data:/app/media
    env_file:
      - .env                # Changed from ../.env to .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - app-network

  celery_beat:
    image: sellaris:latest
    command: celery -A config beat -l info
    volumes:
      - media-data:/app/media
    env_file:
      - .env                # Changed from ../.env to .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 512m
    cpus: 0.5
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
  media-data:               # Added missing volume definition
    driver: local

networks:
  app-network:
    driver: bridge
