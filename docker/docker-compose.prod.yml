services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    command: daphne -b 0.0.0.0 -p 8000 config.asgi:application
    env_file:
      - ../.env
    depends_on:
      - redis
    networks:
      - app-network
    restart: unless-stopped

  redis:
    image: redis:7
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file:
      - ../.env
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - app-network
    restart: unless-stopped


volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge