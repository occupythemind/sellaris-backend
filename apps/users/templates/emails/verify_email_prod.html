<!-- Email Template for email verification on production -->
<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Verify your email</title>
    </head>
    <body style="margin:0; padding:0; background-color:#f4f4f4; font-family:Arial, sans-serif;">

        <table width="100%%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f4; padding:20px;">
            <tr>
            <td align="center">

                <table width="500" cellpadding="0" cellspacing="0" style="background:#ffffff; padding:30px; border-radius:8px;">
                
                <tr>
                    <td align="center">
                    <h2 style="margin-bottom:10px;">Verify your email</h2>
                    <p style="color:#555;">Thanks for signing up. Please confirm your email address by clicking the button below.</p>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding:20px;">
                    <a href="{{ verify_url }}" 
                        style="background-color:#4CAF50; color:#ffffff; padding:12px 25px; text-decoration:none; border-radius:5px; display:inline-block; font-weight:bold;">
                        Verify Email
                    </a>
                    </td>
                </tr>

                <tr>
                    <td>
                    <p style="font-size:12px; color:#999;">
                        If the button doesn’t work, copy and paste this link into your browser:
                    </p>
                    <p style="font-size:12px; word-break:break-all;">
                        {{ verify_url }}
                    </p>
                    </td>
                </tr>

                <tr>
                    <td align="center" style="padding-top:20px;">
                    <p style="font-size:12px; color:#aaa;">
                        If you didn’t create an account, you can ignore this email.
                    </p>
                    </td>
                </tr>

                </table>

            </td>
            </tr>
        </table>

    </body>
</html>
