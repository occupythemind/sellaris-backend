server {
    listen 80;
    server_name api-sellaris.gleeze.com  www.api-sellaris.gleeze.com ;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api-sellaris.gleeze.com  www.api-sellaris.gleeze.com ;

    ssl_certificate /etc/letsencrypt/live/api-sellaris.gleeze.com /fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-sellaris.gleeze.com /privkey.pem;

    location / {
        proxy_pass http://web:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}